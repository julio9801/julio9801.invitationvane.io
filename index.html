<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Años | Vanessa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-principal: #e198b2; /* Rosa pastel elegante */
            --color-dorado: #c5a059;
            --texto-oscuro: #333;
            --texto-suave: #666;
            --fondo-acuarela: #fcf6f8;
        }

        body {
            background-color: #f0f0f0;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--texto-oscuro);
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            max-width: 480px;
            width: 100%;
            padding: 60px 25px;
            border-radius: 2px; /* Estilo de tarjeta impresa */
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            border: 1px solid #eee;
        }

        /* FONDO DE ACUARELA SUAVE */
        .card-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--fondo-acuarela);
            background-image: radial-gradient(#fff 20%, transparent 20%), radial-gradient(#fff 20%, transparent 20%);
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px;
            opacity: 0.1;
            z-index: 0;
        }

        /* MARCO FLORAL SVG ESTILO ACUARELA (Integrado para cero errores) */
        .flower-decor {
            position: absolute;
            width: 200px;
            height: 200px;
            z-index: 1;
            pointer-events: none;
        }
        .top-left {
            top: -20px; left: -20px;
        }
        .top-right {
            top: -20px; right: -20px;
            transform: scaleX(-1);
        }
        .bottom-left {
            bottom: -20px; left: -20px;
            transform: scaleY(-1);
        }
        .bottom-right {
            bottom: -20px; right: -20px;
            transform: scale(-1);
        }

        /* TEXTOS PRINCIPALES */
        .content {
            position: relative;
            z-index: 2;
        }

        h1 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 4px; color: #999; margin-bottom: 5px; }
        .nombre { 
            font-family: 'Dancing Script', cursive; 
            font-size: 5.2rem; 
            color: var(--texto-oscuro); 
            margin: 10px 0; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.03); 
        }
        .xv-title {
            font-size: 1.1rem;
            color: var(--color-dorado);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            margin-bottom: 25px;
        }
        .frase { font-style: italic; color: #777; font-size: 1rem; line-height: 1.7; margin: 0 auto 30px; max-width: 85%; }

        /* BLOQUE DE FECHA Y SALÓN */
        .event-block {
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 30px 0;
            margin: 30px 0;
            background: rgba(255,255,255,0.6);
        }
        .date {
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--texto-oscuro);
            margin-bottom: 15px;
        }
        .time {
            font-size: 1.1rem;
            color: var(--color-principal);
            font-weight: 600;
        }
        .salon { 
            font-size: 1.5rem; 
            color: var(--texto-oscuro); 
            font-weight: 600; 
            margin-top: 15px;
            font-family: 'Montserrat', sans-serif;
        }

        /* CONTADOR */
        .countdown { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .time-box { 
            color: var(--texto-oscuro); 
            padding: 10px; 
            border-radius: 8px; 
            width: 65px; 
            border: 1px solid #eee;
            background: white;
        }
        .time-box span { display: block; font-size: 1.8rem; font-weight: bold; }
        .time-box label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #999; }

        /* MAPA Y BOTONES */
        .map-container { margin: 30px 0; border-radius: 2px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        iframe { width: 100%; height: 200px; border: 0; }

        .btn { display: block; text-decoration: none; padding: 18px; border-radius: 2px; font-weight: 600; margin: 15px 0; transition: 0.4s; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-rsvp { background: var(--texto-oscuro); color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-map { background: white; color: var(--color-dorado); border: 1px solid var(--color-dorado); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }

    </style>
</head>
<body>

    <div class="card">
        <div class="card-bg"></div>

        <svg class="flower-decor top-left" viewBox="0 0 200 200">
            <path d="M50 20C70 10 90 20 100 40C110 20 130 10 150 20C160 40 150 60 130 70C150 80 160 100 150 120C130 130 110 120 100 100C90 120 70 130 50 120C40 100 50 80 70 70C50 60 40 40 50 20Z" fill="#e198b2" opacity="0.6"/> <path d="M100 60C120 50 140 60 150 80C160 60 180 50 200 60C210 80 200 100 180 110C200 120 210 140 200 160C180 170 160 160 150 140C140 160 120 170 100 160C90 140 100 120 120 110C100 100 90 80 100 60Z" fill="#d0bdf4" opacity="0.5"/> <circle cx="150" cy="110" r="10" fill="#fef6be"/> <path d="M20 50L60 90L40 110L20 70Z" fill="#a5d6a7" opacity="0.4"/> <path d="M10 80L40 120L20 140Z" fill="#d2b48c" opacity="0.3"/> </svg>
        <svg class="flower-decor bottom-right" viewBox="0 0 200 200">
            <path d="M50 20C70 10 90 20 100 40C110 20 130 10 150 20C160 40 150 60 130 70C150 80 160 100 150 120C130 130 110 120 100 100C90 120 70 130 50 120C40 100 50 80 70 70C50 60 40 40 50 20Z" fill="#e198b2" opacity="0.6"/>
            <path d="M100 60C120 50 140 60 150 80C160 60 180 50 200 60C210 80 200 100 180 110C200 120 210 140 200 160C180 170 160 160 150 140C140 160 120 170 100 160C90 140 100 120 120 110C100 100 90 80 100 60Z" fill="#d0bdf4" opacity="0.5"/>
            <circle cx="150" cy="110" r="10" fill="#fef6be"/>
            <path d="M20 50L60 90L40 110L20 70Z" fill="#a5d6a7" opacity="0.4"/>
            <path d="M10 80L40 120L20 140Z" fill="#d2b48c" opacity="0.3"/>
        </svg>

        <div class="content">
            <h1>Te invito a celebrar</h1>
            <div class="nombre">Vanessa</div>
            <div class="xv-title">Mis XV Años</div>
            
            <p class="frase">"Un día para soñar, un momento para recordar y una vida para agradecer. ¡Te espero!"</p>

            <div class="countdown" id="countdown">
                <div class="time-box"><span id="days">00</span><label>Días</label></div>
                <div class="time-box"><span id="hours">00</span><label>Horas</label></div>
                <div class="time-box"><span id="minutes">00</span><label>Min</label></div>
                <div class="time-box"><span id="seconds">00</span><label>Seg</label></div>
            </div>

            <div class="event-block">
                <p class="date">📅 SÁBADO | <strong>13 de Junio, 2026</strong></p>
                <p class="time">⏰ 16:00 Horas (4:00 PM)</p>
                <p class="salon">📍 Salón La Casa Grande</p>
            </div>

            <div class="map-container">
                <iframe src="https://googleusercontent.com/maps.google.com/6" allowfullscreen="" loading="lazy"></iframe>
            </div>

            <a href="https://googleusercontent.com/maps.google.com/7" target="_blank" class="btn btn-map">📍 Ver Ubicación en Google Maps</a>
            
            <a href="https://wa.me/525527516064?text=¡Hola! Confirmo mi asistencia a los XV de Vanessa." class="btn btn-rsvp">💌 Confirmar Asistencia</a>
        </div>
    </div>

    <script>
        // Fecha del evento: 13 de junio de 2026 a las 16:00
        const eventDate = new Date("June 13, 2026 16:00:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const diff = eventDate - now;

            if (diff < 0) {
                document.getElementById("countdown").innerHTML = "<h3>¡Ya llegó el gran día!</h3>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h;
            document.getElementById("minutes").innerText = m;
            document.getElementById("seconds").innerText = s;
        }, 1000);
    </script>

</body>
</html>
