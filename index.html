<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Años | Vanessa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-principal: #e198b2; /* Rosa pastel elegante */
            --color-dorado: #c5a059;
            --fondo: #f9f9f9;
        }

        body {
            background-color: var(--fondo);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .card {
            background: white;
            max-width: 500px;
            width: 90%;
            padding: 30px 15px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin: 20px 0;
            border: 1px solid #f0f0f0;
        }

        h1 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px; color: #888; margin-bottom: 0; }
        
        .nombre {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            color: var(--color-principal);
            margin: 5px 0;
        }

        .frase { font-style: italic; color: #666; font-size: 0.9rem; padding: 0 20px; margin-bottom: 25px; }

        .info-boda {
            font-size: 1.1rem;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 15px 0;
            margin: 20px 0;
        }

        /* Contador */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .time-box {
            background: var(--color-principal);
            color: white;
            padding: 8px;
            border-radius: 10px;
            width: 65px;
        }
        .time-box span { display: block; font-size: 1.4rem; font-weight: bold; }
        .time-box label { font-size: 0.6rem; text-transform: uppercase; }

        /* Mapa */
        .map-container {
            margin: 20px 0;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #eee;
        }
        iframe { width: 100%; height: 200px; border: 0; }

        /* Botones */
        .btn {
            display: block;
            text-decoration: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: 600;
            margin: 10px 0;
            transition: 0.3s;
        }
        .btn-rsvp {
            background: var(--color-principal);
            color: white;
            box-shadow: 0 4px 15px rgba(225, 152, 178, 0.4);
        }
        .btn-rsvp:hover { transform: scale(1.02); }

    </style>
</head>
<body>

    <div class="card">
        <h1>Mis XV Años</h1>
        <div class="nombre">Vanessa</div>
        
        <p class="frase">"Un día para soñar, un momento para recordar y una vida para agradecer. ¡Acompáñame!"</p>

        <div class="countdown" id="countdown">
            <div class="time-box"><span id="days">00</span><label>Días</label></div>
            <div class="time-box"><span id="hours">00</span><label>Horas</label></div>
            <div class="time-box"><span id="minutes">00</span><label>Min</label></div>
            <div class="time-box"><span id="seconds">00</span><label>Seg</label></div>
        </div>

        <div class="info-boda">
            <p>📅 <strong>13 de Junio de 2026</strong></p>
            <p>⏰ 19:00 Horas</p>
            <p>📍 Salón de Eventos Royal</p>
        </div>

        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3762.4801!2d-99.1332!3d19.4326!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTnCsDI1JzU3LjQiTiA5OcKwMDgnMDAuMCJX!5e0!3m2!1ses!2smx!4v1625612345678" allowfullscreen="" loading="lazy"></iframe>
        </div>

        <a href="https://wa.me/521234567890?text=¡Hola! Confirmo mi asistencia a los XV de Vanessa." class="btn btn-rsvp">Confirmar Asistencia</a>
    </div>

    <script>
        // Configuración de la fecha
        const eventDate = new Date("June 13, 2026 19:00:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const diff = eventDate - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h;
            document.getElementById("minutes").innerText = m;
            document.getElementById("seconds").innerText = s;
        }, 1000);
    </script>

</body>
</html>
