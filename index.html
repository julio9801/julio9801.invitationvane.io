<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Años | Vanessa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-principal: #e198b2; 
            --color-dorado: #c5a059;
        }

        body {
            background-color: #fff5f8;
            /* Fondo sutil floral */
            background-image: url('https://www.transparenttextures.com/patterns/p6.png');
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            max-width: 480px;
            width: 90%;
            padding: 60px 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            margin: 40px 0;
            border: 1px solid #fce4ec;
            position: relative;
            overflow: hidden;
        }

        /* Flores en las esquinas - Imágenes Reales */
        .flower {
            position: absolute;
            width: 180px; /* Tamaño de las flores */
            z-index: 0;
            pointer-events: none;
        }
        .top-left {
            top: -20px;
            left: -20px;
        }
        .bottom-right {
            bottom: -20px;
            right: -20px;
            transform: rotate(180deg);
        }

        h1 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 4px; color: #999; margin-bottom: 0; position: relative; z-index: 1; }
        .nombre { font-family: 'Dancing Script', cursive; font-size: 4.5rem; color: var(--color-principal); margin: 10px 0; position: relative; z-index: 1; text-shadow: 1px 1px 2px rgba(0,0,0,0.05); }
        .frase { font-style: italic; color: #666; font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; position: relative; z-index: 1; }

        .info-evento {
            font-size: 1.1rem;
            border-top: 1px solid #fce4ec;
            border-bottom: 1px solid #fce4ec;
            padding: 20px 0;
            margin: 25px 0;
            position: relative;
            z-index: 1;
            background: rgba(255, 245, 248, 0.5);
        }

        /* Contador */
        .countdown { display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; position: relative; z-index: 1; }
        .time-box { background: var(--color-principal); color: white; padding: 10px; border-radius: 12px; width: 68px; box-shadow: 0 4px 10px rgba(225, 152, 178, 0.3); }
        .time-box span { display: block; font-size: 1.6rem; font-weight: bold; }
        .time-box label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Mapa Seguro */
        .map-container { margin: 25px 0; border-radius: 20px; overflow: hidden; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.08); position: relative; z-index: 1; }
        iframe { width: 100%; height: 250px; border: 0; }

        /* Botones */
        .btn { display: block; text-decoration: none; padding: 16px; border-radius: 50px; font-weight: 600; margin: 12px 0; transition: 0.4s; position: relative; z-index: 1; }
        .btn-rsvp { background: var(--color-principal); color: white; box-shadow: 0 6px 20px rgba(225, 152, 178, 0.4); }
        .btn-map { background: white; color: var(--color-dorado); border: 2px solid var(--color-dorado); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }

    </style>
</head>
<body>

    <div class="card">
        <img src="https://i.ibb.co/YyY4R0G/flower-corner.png" class="flower top-left" alt="decoración">
        <img src="https://i.ibb.co/YyY4R0G/flower-corner.png" class="flower bottom-right" alt="decoración">

        <h1>Mis XV Años</h1>
        <div class="nombre">Vanessa</div>
        
        <p class="frase">"Un día para soñar, un momento para recordar y una vida para agradecer. ¡Te espero!"</p>

        <div class="countdown" id="countdown">
            <div class="time-box"><span id="days">00</span><label>Días</label></div>
            <div class="time-box"><span id="hours">00</span><label>Horas</label></div>
            <div class="time-box"><span id="minutes">00</span><label>Min</label></div>
            <div class="time-box"><span id="seconds">00</span><label>Seg</label></div>
        </div>

        <div class="info-evento">
            <p>📅 <strong>13 de Junio de 2026</strong></p>
            <p>⏰ 16:00 Horas (4:00 PM)</p>
            <p>📍 Salón: <strong>La Casa Grande</strong></p>
        </div>

        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3762.661!2d-99.167!3d19.432!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTnCsDI1JzU1LjIiTiA5OcKwMTAnMDAuOCJX!5e0!3m2!1ses!2smx!4v1700000000000!5m2!1ses!2smx" allowfullscreen="" loading="lazy"></iframe>
        </div>

        <a href="https://maps.app.goo.gl/qX8W6C8XJ3Wp9wU8A" target="_blank" class="btn btn-map">📍 Abrir Ubicación en Maps</a>
        
        <a href="https://wa.me/525527516064?text=¡Hola! Confirmo mi asistencia a los XV de Vanessa." class="btn btn-rsvp">💌 Confirmar Asistencia</a>
    </div>

    <script>
        const eventDate = new Date("June 13, 2026 16:00:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const diff = eventDate - now;

            if (diff < 0) {
                document.getElementById("countdown").innerHTML = "<h3>¡Es hoy!</h3>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h;
            document.getElementById("minutes").innerText = m;
            document.getElementById("seconds").innerText = s;
        }, 1000);
    </script>

</body>
</html>
